# =============================================================================
# NAS Storage Configuration for Watershed Disturbance Mapping System
# Database storage optimization for local NAS and network storage
# =============================================================================

# =============================================================================
# STORAGE CONFIGURATION OVERVIEW
# =============================================================================

# This configuration optimizes PostgreSQL for use with local NAS storage
# including NFS, SMB/CIFS, iSCSI, and other network file systems.

# Key considerations for NAS storage:
# 1. Network latency vs local disk performance
# 2. Connection stability and reliability
# 3. Storage throughput and IOPS
# 4. Data consistency and durability
# 5. Backup and recovery procedures

# =============================================================================
# POSTGRESQL NAS OPTIMIZATION SETTINGS
# =============================================================================

# WAL (Write-Ahead Log) settings for network storage
# Critical: Store WAL on fast, reliable storage (preferably local SSD)
wal_level = replica
wal_buffers = 128MB  # Increased for network storage
checkpoint_completion_target = 0.9

# WAL archiving for NAS backup
archive_mode = on
archive_command = 'cp %p /mnt/nas/postgresql/wal_archive/%f'
archive_timeout = 300  # Archive every 5 minutes for better backup coverage

# =============================================================================
# MEMORY AND CACHE SETTINGS
# =============================================================================

# Increase shared buffers for NAS storage (more cache to reduce network I/O)
shared_buffers = 3GB  # 25-30% of RAM for dedicated database server

# Increase effective cache size assumption
effective_cache_size = 8GB  # 75% of total RAM

# Increase work_mem for complex queries
work_mem = 512MB  # Increased for network storage

# Increase maintenance work memory
maintenance_work_mem = 1GB  # For CREATE INDEX and VACUUM

# =============================================================================
# CHECKPOINT AND WAL SETTINGS
# =============================================================================

# More frequent checkpoints for network storage
min_wal_size = 8GB  # Increased for network storage
max_wal_size = 32GB  # Increased for network storage
checkpoint_timeout = 10min  # More frequent checkpoints

# WAL writer settings
wal_writer_delay = 100ms  # More frequent WAL writes
wal_writer_flush_after = 2MB

# =============================================================================
# CONNECTION SETTINGS FOR NETWORK STORAGE
# =============================================================================

# Optimize for higher latency connection
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 10

# Connection timeout settings
login_timeout = 60  # 1 minute timeout for connections
statement_timeout = 0  # No statement timeout (adjust for your needs)
idle_in_transaction_session_timeout = 10min  # Kill long idle transactions

# =============================================================================
# ASYNC I/O AND DISK I/O SETTINGS
# =============================================================================

# Optimized for network file systems
random_page_cost = 1.2  # Slightly higher than local SSD due to network latency
effective_io_concurrency = 300  # Increase for network storage

# Default file system type assumptions (adjust based on your NAS)
# ext4, xfs, zfs, ntfs, etc. - see PostgreSQL documentation

# =============================================================================
# LOGGING FOR NETWORK STORAGE ISSUES
# =============================================================================

# Enhanced logging for network storage debugging
log_min_messages = info
log_min_error_statement = error
log_min_duration_statement = 500  # Log queries taking >500ms

# Log I/O related messages
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0  # Log all temporary files to catch I/O issues

# =============================================================================
# BACKGROUND WRITER SETTINGS
# =============================================================================

# Optimize background writer for network storage
bgwriter_delay = 100ms  # More frequent bgwriter activity
bgwriter_lru_maxpages = 1000  # Increased for network storage
bgwriter_lru_multiplier = 2.5  # More aggressive background writing
bgwriter_flush_after = 1MB  # Write in larger chunks

# =============================================================================
# AUTOVACUUM SETTINGS FOR NETWORK STORAGE
# =============================================================================

# Optimize autovacuum for network storage
autovacuum = on
autovacuum_max_workers = 6  # More workers for network storage
autovacuum_naptime = 20s  # More frequent autovacuum runs

# Autovacuum cost settings (reduced for network storage)
autovacuum_vacuum_cost_delay = 10ms  # Less delay for better performance
autovacuum_vacuum_cost_limit = 2000  # Higher limit for network storage

# =============================================================================
# QUERY PLANNER SETTINGS
# =============================================================================

# Enable features for better query planning with network storage
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_parallel_hash = on

# Statistics target for better query planning
default_statistics_target = 2000  # Higher for better estimates with network storage

# =============================================================================
# PARALLEL QUERY SETTINGS
# =============================================================================

# Optimize parallel query for network storage
max_parallel_workers_per_gather = 4  # More parallel workers
max_parallel_workers = 8  # Total parallel workers
max_parallel_maintenance_workers = 4  # Parallel maintenance operations

# =============================================================================
# CONNECTION POOLING RECOMMENDATIONS
# =============================================================================

# Use connection pooling to reduce connection overhead
# Recommended: PgBouncer or similar
# min_pool_size = 5  # PgBouncer setting
# reserve_pool_size = 10  # PgBouncer setting
# pool_mode = transaction  # PgBouncer setting

# =============================================================================
# FILE SYSTEM SPECIFIC SETTINGS
# =============================================================================

# NFS specific settings (if using NFS)
# synchronous_commit = local  # For NFS, use local to reduce network overhead

# SMB/CIFS specific settings
# Consider using NFS instead of SMB for better performance

# iSCSI specific settings
# iSCSI should perform similar to local disk

# =============================================================================
# NAS SPECIFIC MONITORING
# =============================================================================

# Monitor network storage performance
track_io_timing = on  # Track I/O timing for storage analysis

# Extended statistics
track_activities = on
track_counts = on
track_functions = pl

# =============================================================================
# TIMESCALEDB OPTIMIZATION FOR NAS
# =============================================================================

# TimescaleDB settings optimized for network storage
timescaledb.telemetry_level = 'off'
timescaledb.max_background_workers = 8
timescaledb.max_cached_chunks_per_hypertable = 128
timescaledb.optimize_multi_range_index_support = on

# Compression settings (may be slower on network storage)
timescaledb.continuous_agg_cagg_compression_threshold = 200

# =============================================================================
# BACKUP STRATEGY FOR NAS
# =============================================================================

# WAL streaming to network storage
# wal_log_hints = on
# full_page_writes = on

# Point-in-time recovery settings
# recovery_target_time = 'timestamp'
# recovery_target_action = 'pause'

# =============================================================================
# MAINTENANCE PROCEDURES FOR NAS
# =============================================================================

# More frequent VACUUM for network storage
# Consider running VACUUM ANALYZE daily instead of relying on autovacuum

# Regular REINDEX (weekly recommended for network storage)
# REINDEX DATABASE watershed_monitor;

# =============================================================================
# PERFORMANCE MONITORING
# =============================================================================

# Monitor network latency
# Use tools like iostat, sar, or custom monitoring

# Monitor PostgreSQL specific metrics
# SELECT * FROM pg_stat_io;
# SELECT * FROM pg_stat_database;

# =============================================================================
# TROUBLESHOOTING NETWORK STORAGE
# =============================================================================

# Common issues and solutions:

# 1. Slow query performance
#    - Increase shared_buffers
#    - Adjust work_mem for complex queries
#    - Check network latency

# 2. Frequent disconnections
#    - Increase login_timeout
#    - Configure proper tcp_keepalive settings
#    - Check NAS connectivity

# 3. WAL archiving failures
#    - Ensure NAS mount is reliable
#    - Check network connectivity
#    - Verify archive_command permissions

# 4. High I/O wait times
#    - Consider using local SSD for WAL
#    - Increase maintenance_work_mem
#    - Optimize background writer settings

# =============================================================================
# RECOMMENDED NAS SETUP
# =============================================================================

# Storage tiers:
# 1. Primary data: High-performance NAS (RAID 10 recommended)
# 2. WAL data: Local SSD if possible (critical for performance)
# 3. Backups: Separate NAS volume for redundancy
# 4. Archive: Long-term storage (cheaper storage tier)

# Network configuration:
# - Gigabit Ethernet minimum (10GbE recommended)
# - Dedicated network for database traffic
# - Proper QoS configuration
# - Network redundancy (bonding/link aggregation)

# File system recommendations:
# - ZFS: Best performance and data integrity
# - XFS: Good performance and stability
# - Btrfs: Good features but may have stability issues
# - ext4: Adequate but not optimal for high-performance needs

# =============================================================================
# SECURITY CONSIDERATIONS
# =============================================================================

# Network security:
# - Use VPN for remote access
# - Restrict network access with firewalls
# - Use SSL/TLS for all connections
# - Regular security updates

# NAS security:
# - Proper NAS access controls
# - Regular backups to multiple locations
# - Encryption at rest (if supported)
# - Network segmentation

# =============================================================================
# CAPACITY PLANNING
# =============================================================================

# Disk space recommendations:
# - Database size: Plan for 5-10x current data growth
# - WAL space: 2-4GB per day minimum
# - Backup space: 2-3x database size
# - Temp space: 10-20% of database size

# Performance planning:
# - Monitor IOPS requirements
# - Plan for network bandwidth needs
# - Consider scaling strategies

# =============================================================================
# EXAMPLE NAS MOUNT CONFIGURATION
# =============================================================================

# /etc/fstab entry example:
# nas-server:/volumes/postgresql /mnt/nas/postgresql nfs rw,hard,intr,timeo=600,retrans=5,_netdev 0 0

# SMB/CIFS example:
# //nas-server/postgresql /mnt/nas/postgresql cifs username=dbuser,password=dbpass,rw,hard,intr,timeo=600 0 0

# Mount options explanation:
# - hard: Hard mount (recommended for databases)
# - intr: Allow interrupt (prevents hangs)
# - timeo=600: 60 second timeout
# - retrans=5: 5 retransmissions
# - _netdev: Wait for network before mounting