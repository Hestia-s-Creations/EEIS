# =============================================================================
# PgBouncer Configuration for Watershed Disturbance Mapping System
# Connection pooling and load balancing for PostgreSQL
# =============================================================================

# =============================================================================
# PgBouncer Configuration Files
# =============================================================================

[databases]
# Database connections pool configuration
watershed_monitor = host=127.0.0.1 port=5432 dbname=watershed_monitor

[pgbouncer]
# Connection pool settings
pool_mode = transaction          # Transaction-based pooling (recommended for web apps)
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/postgresql
user = postgres

# Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename = $1

# Pool sizing
max_client_conn = 200            # Maximum client connections
default_pool_size = 20           # Default server connections per pool
min_pool_size = 5                # Minimum server connections
reserve_pool_size = 5            # Reserved connections for emergencies
max_db_connections = 50          # Maximum connections per database
max_user_connections = 100       # Maximum connections per user

# Timeouts
server_lifetime = 3600           # Server connection lifetime (1 hour)
server_idle_timeout = 600        # Server connection idle timeout (10 minutes)
client_idle_timeout = 0          # Client connection idle timeout (0 = no timeout)
idle_server_timeout = 0          # Idle server connection timeout

# Connection management
query_wait_timeout = 120         # Wait timeout for query (2 minutes)
query_timeout = 0                # Query timeout (0 = no timeout)
tcp_keepalive = 1                # TCP keepalive
tcp_keepcnt = 5                  # TCP keepalive count
tcp_keepidle = 60                # TCP keepalive idle time
tcp_keepintvl = 10               # TCP keepalive interval

# Log settings
log_connections = 0              # Log connections
log_disconnections = 0           # Log disconnections
log_pooler_errors = 1            # Log pooler errors
log_stats = 1                    # Log statistics
stats_period = 60                # Statistics period (seconds)

# Performance settings
query_patterns =                 # Query patterns to ignore in stats
ignore_startup_parameters = extra_float_digits, search_path

# TLS/SSL settings (enable in production)
# sslmode = require
# ssl_cert = /etc/ssl/certs/pgbouncer.crt
# ssl_key = /etc/ssl/private/pgbouncer.key

# Application name
application_name_add_host = 1

# Statistics
stats_users = admin, monitoring

# Show pools
show_user_list = admin, monitoring

# DNS settings
dns_max_ttl = 15
dns_nxdomain_ttl = 15
dns_zone_check_period = 0

# Performance monitoring
verbose = 0                      # Verbose logging level (0-3)

# Ignore arbitrary responses
ignore_startup_parameters = 'search_path'

# Custom settings for watershed monitoring
# Disable verbose logging for better performance
log_connections = 0
log_disconnections = 0
log_stats = 1

# Connection string for applications
# Use this instead of direct PostgreSQL connection:
# pgbouncer://user:password@localhost:6432/watershed_monitor

# Statistics query (for monitoring)
# SELECT * FROM pgbouncer_show_pools;
# SELECT * FROM pgbouncer_show_clients;
# SELECT * FROM pgbouncer_show_servers;