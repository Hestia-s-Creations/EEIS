# =============================================================================
# SECURITY CONSIDERATIONS
# =============================================================================

# SSL/TLS connections (uncomment and configure certificates)
# hostssl    all             all             0.0.0.0/0               scram-sha-256
# hostssl    all             all             ::/0                    scram-sha-256

# Reject connections that don't match any rule above
# This is already the default behavior, but making it explicit
host    all             all             0.0.0.0/0               reject

# =============================================================================
# AUTHENTICATION METHODS EXPLAINED
# =============================================================================

# trust     - Allow connection unconditionally (INSECURE - development only)
# reject    - Reject connections unconditionally
# scram-sha-256 - Modern secure password authentication (recommended)
# md5       - MD5 hashed passwords (legacy, use scram-sha-256 instead)
# peer      - Use OS user name (local connections only)
# ident     - Use identd service to determine user name
# password  - Plain text password (NOT RECOMMENDED)
# radius    - RADIUS authentication
# ldap      - LDAP authentication
# cert      - SSL client certificate authentication

# =============================================================================
# BEST PRACTICES
# =============================================================================

# 1. Always use scram-sha-256 or better for password authentication
# 2. Restrict access using IP ranges where possible
# 3. Use SSL/TLS for production environments
# 4. Create specific users for different application components
# 5. Regularly audit and review access rules
# 6. Use connection pooling to reduce connection overhead
# 7. Monitor failed connection attempts

