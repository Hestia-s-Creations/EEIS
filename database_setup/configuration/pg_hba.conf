# host    all             admin_user       10.1.20.0/24          scram-sha-256
# 
# # Deny all other remote access
# host    all             all             0.0.0.0/0               reject

# =============================================================================
# TROUBLESHOOTING
# =============================================================================

# Common issues:
# 1. "no pg_hba.conf entry" error - Check your client address and method
# 2. Authentication fails - Verify password and method match
# 3. Can't connect remotely - Ensure listen_addresses is not 'localhost'
# 4. SSL issues - Check SSL configuration and certificates
# 5. Connection refused - Check PostgreSQL is running and port is open

# Debugging:
# - Check PostgreSQL logs: tail -f /var/log/postgresql/postgresql-*.log
# - Test connection: psql -h hostname -U username -d database
# - Verify network: telnet hostname 5432
# - Check firewall: sudo iptables -L -n

# =============================================================================
# NOTES
# =============================================================================

# - Remember to reload PostgreSQL after changes: systemctl reload postgresql
# - Test changes during maintenance windows for production systems
# - Keep backup of pg_hba.conf before making changes
# - Consider using connection pooling (PgBouncer) for better performance
# - Monitor failed authentication attempts for security threats