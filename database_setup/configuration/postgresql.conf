# =============================================================================
# PostgreSQL Configuration for Watershed Disturbance Mapping System
# Optimized for spatial queries and time-series data
# =============================================================================

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================

# Shared memory settings (recommended: 25% of total RAM for dedicated DB server)
shared_buffers = 2GB

# Effective cache size (recommended: 75% of total RAM)
effective_cache_size = 6GB

# Work memory per operation (increased for spatial operations)
work_mem = 256MB

# Maintenance work memory for operations like CREATE INDEX, VACUUM
maintenance_work_mem = 512MB

# Maximum connections
max_connections = 200

# Reserved connections for superuser
superuser_reserved_connections = 3

# =============================================================================
# CHECKPOINT CONFIGURATION
# =============================================================================

# Checkpoint completion target (fraction of time between checkpoints)
checkpoint_completion_target = 0.9

# WAL buffer size
wal_buffers = 64MB

# WAL retention (keep enough for point-in-time recovery)
min_wal_size = 4GB
max_wal_size = 16GB

# Checkpoint settings for performance
checkpoint_timeout = 15min
checkpoint_warning = 30s

# =============================================================================
# WAL ARCHIVING CONFIGURATION
# =============================================================================

# Enable WAL archiving for backup and recovery
# archive_mode = on
# archive_command = 'cp %p /var/lib/postgresql/wal_archive/%f'
# archive_timeout = 300  # Archive every 5 minutes

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Log all queries taking longer than 1 second
log_min_duration_statement = 1000

# Log line format with detailed information
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log important events
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Log temporary file usage
log_temp_files = 0  # Log all temporary files

# Log maintenance operations
log_autovacuum_min_duration = 0
log_statement = 'none'  # Set to 'all' for debugging (performance impact)

# =============================================================================
# AUTOVACUUM CONFIGURATION
# =============================================================================

# Enable autovacuum
autovacuum = on

# Number of autovacuum worker processes
autovacuum_max_workers = 4

# Time between autovacuum runs
autovacuum_naptime = 30s

# Autovacuum thresholds
autovacuum_vacuum_threshold = 100
autovacuum_analyze_threshold = 100

# Autovacuum scale factors
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# Autovacuum costs (reduced for better performance)
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = 1000

# =============================================================================
# CONNECTION AND AUTHENTICATION
# =============================================================================

# Listen on all interfaces (adjust for production)
listen_addresses = '*'

# Default port
port = 5432

# Authentication method
password_encryption = scram-sha-256

# =============================================================================
# RESOURCE USAGE (EXCEPT WAL)
# =============================================================================

# Memory for shared memory buffers (already set above)
# shared_buffers = 2GB

# Sort memory (work_mem is used for sorts)
# work_mem = 256MB

# Hash memory (uses work_mem settings)
# hash_mem_multiplier = 1.0

# Temporary file management
temp_file_limit = -1  # Unlimited (adjust if needed)

# =============================================================================
# WRITE AHEAD LOG
# =============================================================================

# WAL settings (already configured above)
# wal_level = replica  # Enable for replication
# wal_buffers = 64MB
# wal_writer_delay = 200ms

# Synchronization level (safer for production)
# synchronous_commit = on  # Set to 'remote_apply' for maximum safety
# synchronous_standby_names = ''  # Set for synchronous replication

# =============================================================================
# QUERY TUNING
# =============================================================================

# Enable query planner features for performance
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_parallel_hash = on
enable_parallel_append = on
enable_parallel_merge_append = on

# Statistics target for better query planning
default_statistics_target = 1000

# Random page cost (adjust for storage type)
# 1.0 for SSD, 1.1 for modern SSD, 4.0 for spinning disk
random_page_cost = 1.1

# Effective I/O concurrency for SSD
effective_io_concurrency = 200

# =============================================================================
# ERROR REPORTING AND LOGGING
# =============================================================================

# Log level (INFO, WARNING, ERROR, DEBUG, etc.)
# log_min_messages = info

# Startup failure logging
log_startup_progress = on

# =============================================================================
# RUNTIME STATISTICS
# =============================================================================

# Track activity statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl

# Track query execution time
# track_query_id = on  # Available in PostgreSQL 14+

# =============================================================================
# STATISTICS MONITORING
# =============================================================================

# Update statistics periodically
update_process_title = on

# =============================================================================
# AUTOVACUUM PARAMETERS
# =============================================================================

# Autovacuum costs (already configured above)
# autovacuum_vacuum_cost_delay = 20ms
# autovacuum_vacuum_cost_limit = 1000

# Autovacuum freezes
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_freeze_min_age = 50000000
autovacuum_multixact_freeze_min_age = 5000000

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================

# Lock timeout
# lock_timeout = 0  # No timeout (set to 30s for production)

# Deadlock detection
# deadlock_timeout = 1s

# =============================================================================
# VERSION/PLATFORM COMPATIBILITY
# =============================================================================

# compatibility
# transform_null_equals = off

# =============================================================================
# ERROR HANDLING
# =============================================================================

# Exit on error (useful for maintenance scripts)
# exit_on_error = off  # Set to 'on' for maintenance scripts

# Restart after crash
restart_after_crash = on

# =============================================================================
# POSTGIS AND SPATIAL SETTINGS
# =============================================================================

# Geometry operations
# These are typically handled by PostGIS, but some global settings help

# PostGIS related
# GEOMETRY_COLUMNS table (if using PostGIS < 3.0)
# postgis.gdal_enabled_drivers = 'ENABLE_ALL'
# postgis.gdal_vsi_options = ''

# =============================================================================
# TIMESCALEDB SETTINGS
# =============================================================================

# Load TimescaleDB extension
shared_preload_libraries = 'timescaledb'

# TimescaleDB configuration
timescaledb.telemetry_level = 'off'
timescaledb.max_background_workers = 4
timescaledb.max_cached_chunks_per_hypertable = 64
timescaledb.optimize_multi_range_index_support = on
timescaledb.minimum_time_in_bucket = INTERVAL '1 millisecond'

# Continuous aggregate settings
timescaledb.continuous_agg_cagg_compression_threshold = 100
timescaledb.continuous_agg_cagg_dropped_chunks_upgrade = on

# =============================================================================
# PERFORMANCE MONITORING
# =============================================================================

# pg_stat_statements (if extension is installed)
# track_query_id = on  # PostgreSQL 14+

# Background writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# Asynchronous behavior
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# =============================================================================
# ADVANCED FEATURES
# =============================================================================

# Incremental backup (requires WAL archiving)
# backup_retention_policy = 'CROSS_CHECK ON backup_location ''/backups'''

# Logical replication (if needed)
# max_logical_replication_workers = 4
# max_sync_workers_per_subscription = 2

# =============================================================================
# CUSTOM EXTENSIONS SETTINGS
# =============================================================================

# pg_stat_statements
# pg_stat_statements.max = 10000
# pg_stat_statements.save = on
# pg_stat_statements.track = all

# pg_trgm for text similarity
# pg_trgm.similarity_threshold = 0.3

# pgcrypto settings (usually fine with defaults)
# pgcrypto.crypt_blowfish_rounds = 12

# =============================================================================
# NOTES FOR PRODUCTION
# =============================================================================

# SSL Configuration (uncomment and configure for production)
# ssl = on
# ssl_cert_file = 'server.crt'
# ssl_key_file = 'server.key'
# ssl_ca_file = 'ca.crt'
# ssl_crl_file = ''

# Replication Configuration (if needed)
# max_wal_senders = 10
# wal_level = replica
# hot_standby = on
# hot_standby_feedback = off

# Memory limits for resource groups (if using)
# resource_group = ''

# Timezone
# timezone = 'UTC'
# timezone_abbreviations = 'Default'

# Locale settings
# lc_messages = 'en_US.utf8'
# lc_monetary = 'en_US.utf8'
# lc_numeric = 'en_US.utf8'
# lc_time = 'en_US.utf8'
