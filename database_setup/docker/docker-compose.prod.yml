version: '3.8'

# =============================================================================
# Production Docker Compose Override
# Use this file to override default settings for production deployments
# 
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # PostgreSQL Database - Production Configuration
  watershed-db:
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 8G          # Increase memory limit for production
          cpus: '4.0'         # Increase CPU limit
        reservations:
          memory: 4G          # Reserve 4GB memory
          cpus: '2.0'         # Reserve 2 CPU cores
    
    # Environment overrides for production
    environment:
      # Higher memory settings for production
      POSTGRES_SHARED_BUFFERS: 2GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 6GB
      POSTGRES_WORK_MEM: 512MB
      POSTGRES_MAINTENANCE_WORK_MEM: 1GB
      
      # Production connection settings
      POSTGRES_MAX_CONNECTIONS: 300
      POSTGRES_SUPERUSER_RESERVED_CONNECTIONS: 5
      
      # Enhanced security
      POSTGRES_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"  # MANDATORY: Change this!
      
      # Performance tuning
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 128MB
      POSTGRES_MIN_WAL_SIZE: 4GB
      POSTGRES_MAX_WAL_SIZE: 16GB
      
      # SSL configuration (uncomment and configure for production)
      # POSTGRES_SSL: on
      # POSTGRES_SSL_CERT: /etc/ssl/certs/server.crt
      # POSTGRES_SSL_KEY: /etc/ssl/private/server.key
    
    # Volume overrides for production (bind mounts for better performance)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal:/var/lib/postgresql/wal  # Separate WAL volume
      - postgres_logs:/var/log/postgresql
      - ./backups:/backups
      - ./config/postgresql.prod.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg_hba.prod.conf:/etc/postgresql/pg_hba.conf:ro
      # SSL certificates (uncomment for production)
      # - ./certs:/etc/ssl/certs:ro
      # - ./keys:/etc/ssl/private:ro
    
    # Network configuration
    networks:
      watershed-network:
        ipv4_address: 172.20.0.10  # Fixed IP for production
    
    # Restart policy for production
    restart: always
    
    # Security configurations
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    
    # Health check overrides for production
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Longer startup time for production
      test: [
        "CMD-SHELL", 
        "pg_isready -U app_user -d watershed_monitor --connect-timeout=10",
        "pg_isready -U postgres -d postgres --connect-timeout=10"
      ]
    
    # Logging configuration for production
    logging:
      driver: "json-file"
      options:
        max-size: "100m"      # Rotate logs at 100MB
        max-file: "5"         # Keep 5 log files
        labels: "com.watershed-monitor.role=primary-database"

  # PgBouncer - Production Configuration
  watershed-pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: watershed-pgbouncer
    restart: always
    
    environment:
      DATABASES_HOST: watershed-db
      DATABASES_PORT: 5432
      DATABASES_USER: app_user
      DATABASES_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"  # MANDATORY: Change this!
      DATABASES_DSNNAME: watershed_monitor
      
      # Production pool settings
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 500        # Higher client connections
      PGBOUNCER_DEFAULT_POOL_SIZE: 50       # Larger pool size
      PGBOUNCER_MIN_POOL_SIZE: 10           # Minimum connections
      PGBOUNCER_RESERVE_POOL_SIZE: 20       # Reserved connections
      
      # Timeouts for production
      PGBOUNCER_SERVER_LIFETIME: 3600       # 1 hour server lifetime
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600    # 10 minutes idle timeout
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: 0      # No client timeout
      
      # Authentication
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
    
    ports:
      - "6432:6432"  # PgBouncer port
    
    volumes:
      - pgbouncer_data:/var/log/pgbouncer
      - ./config/pgbouncer.prod.ini:/etc/pgbouncer.ini:ro
      - ./config/pgbouncer_users.txt:/etc/pgbouncer/userlist.txt:ro
    
    networks:
      - watershed-network
    
    # Health check for PgBouncer
    healthcheck:
      test: ["CMD", "psql", "-h", "localhost", "-p", "6432", "-U", "pgbouncer", "-c", "SHOW VERSION;"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis - Production Configuration
  redis:
    image: redis:7-alpine
    container_name: watershed-redis
    restart: always
    
    command: >
      redis-server 
      --requirepass "CHANGE_ME_TO_STRONG_PASSWORD"  # MANDATORY: Change this!
      --appendonly yes 
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    
    networks:
      - watershed-network
    
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backup Service - Production Configuration
  watershed-db-backup:
    image: timescale/timescaledb-ha:pg14-latest
    container_name: watershed-postgres-backup
    restart: "no"  # Run manually or via cron
    
    environment:
      PGUSER: app_user
      PGPASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"  # MANDATORY: Change this!
      PGHOST: watershed-db
      PGDATABASE: watershed_monitor
      PGPORT: 5432
      
      # Backup scheduling
      BACKUP_SCHEDULE: "0 2 * * *"           # Daily at 2 AM
      BACKUP_RETENTION_DAYS: 30              # Keep 30 days of backups
      BACKUP_COMPRESSION_LEVEL: 9            # Maximum compression
    
    volumes:
      - ./backup_scripts:/backup_scripts:ro
      - ./backups:/backups
      - ./backups/logs:/var/log/backup
    
    networks:
      - watershed-network
    
    depends_on:
      - watershed-db
    
    # Only run backup service in production
    profiles:
      - backup
    
    # Resource limits for backup operations
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Prometheus - Production Configuration (Enhanced)
  prometheus:
    image: prom/prometheus:latest
    container_name: watershed-prometheus
    restart: always
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'  # 90 days retention
      - '--storage.tsdb.retention.size=50GB' # 50GB size limit
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    
    ports:
      - "9090:9090"
    
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - ./monitoring/rules:/etc/prometheus/rules:ro
    
    networks:
      - watershed-network
    
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Grafana - Production Configuration
  grafana:
    image: grafana/grafana:latest
    container_name: watershed-grafana
    restart: always
    
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"  # MANDATORY: Change this!
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_ALLOW_ORG_CREATE: false
      GF_USERS_DISABLE_SIGNUP: true
      
      # Security settings
      GF_SECURITY_SECRET_KEY: "CHANGE_ME_TO_SECRET_KEY"  # MANDATORY: Change this!
      GF_SECURITY_COOKIE_SECURE: true
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      
      # Performance settings
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_LOG_FILTERS: rendering:debug
      
      # Email settings
      GF_SMTP_ENABLED: true
      GF_SMTP_HOST: "smtp.example.com:587"  # Configure for your SMTP server
      GF_SMTP_USER: "alerts@example.com"    # Configure SMTP user
      GF_SMTP_PASSWORD: "email_password"    # Configure SMTP password
      GF_SMTP_FROM_ADDRESS: "grafana@example.com"
      GF_SMTP_FROM_NAME: "Watershed Monitoring"
    
    ports:
      - "3000:3000"
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/plugins:/var/lib/grafana/plugins:ro
    
    networks:
      - watershed-network
    
    depends_on:
      - prometheus
      - watershed-db
    
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Nginx Reverse Proxy (Optional - for SSL termination)
  nginx:
    image: nginx:alpine
    container_name: watershed-nginx
    restart: always
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    
    networks:
      - watershed-network
    
    depends_on:
      - watershed-db
      - watershed-pgbouncer
      - grafana
      - prometheus
    
    profiles:
      - proxy  # Enable with --profile proxy
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =============================================================================
# Network Configuration - Production
# =============================================================================

networks:
  watershed-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
          ip_range: 172.20.1.0/24
    driver_opts:
      com.docker.network.bridge.name: watershed-net-prod
      com.docker.network.driver.mtu: 1500

# =============================================================================
# Volumes - Production Configuration
# =============================================================================

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/data/postgres  # Change path as needed
  
  postgres_wal:  # Separate WAL volume for better performance
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/wal
  
  postgres_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/logs/postgres
  
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/data/redis
  
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/data/prometheus
  
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/data/grafana
  
  pgbouncer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/watershed-db/logs/pgbouncer

