  - package-ecosystem: "npm"
    directory: "/frontend-fresh/watershed-mapping-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0  # security alerts only
  - package-ecosystem: "npm"
    directory: "/frontend"
