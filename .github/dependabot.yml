      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0  # security alerts only
  - package-ecosystem: "pip"
    directory: "/python_processing"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0  # security alerts only
