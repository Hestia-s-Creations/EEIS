# Watershed Disturbance Mapping System - WireGuard Server Configuration
# Primary VPN Server Configuration

[Interface]
# Server private key (generate with: wg genkey | tee privatekey | wg pubkey > publickey)
PrivateKey = SERVER_PRIVATE_KEY_HERE

# Server IP address in VPN network
Address = 10.8.0.1/24

# Port for WireGuard server
ListenPort = 51820

# NAT and forwarding settings
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# DNS servers for clients (Cloudflare DNS)
PostUp = iptables -A FORWARD -p tcp --dport 53 -j ACCEPT; iptables -A FORWARD -p udp --dport 53 -j ACCEPT
PostDown = iptables -D FORWARD -p tcp --dport 53 -j ACCEPT; iptables -D FORWARD -p udp --dport 53 -j ACCEPT

# Kill switch - block all traffic if VPN connection drops
PostUp = iptables -I FORWARD -j DROP
PostDown = iptables -D FORWARD -j DROP

# Allow established connections
PostUp = iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
PostDown = iptables -D FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

# Logging
LogLevel = 3

# Performance tuning
Table = off

# Client configurations will be appended below

# Admin workstation
[Peer]
PublicKey = ADMIN_CLIENT_PUBLIC_KEY_HERE
AllowedIPs = 10.8.0.2/32
# Optional: PersistentKeepalive = 25

# Mapping analyst 1
[Peer]
PublicKey = ANALYST1_CLIENT_PUBLIC_KEY_HERE
AllowedIPs = 10.8.0.3/32

# Mapping analyst 2
[Peer]
PublicKey = ANALYST2_CLIENT_PUBLIC_KEY_HERE
AllowedIPs = 10.0.4/32

# Field researcher mobile
[Peer]
PublicKey = RESEARCHER_MOBILE_PUBLIC_KEY_HERE
AllowedIPs = 10.8.0.5/32

# Emergency access
[Peer]
PublicKey = EMERGENCY_ACCESS_PUBLIC_KEY_HERE
AllowedIPs = 10.8.0.10/32
