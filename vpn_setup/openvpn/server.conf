# Watershed Disturbance Mapping System - OpenVPN Server Configuration
# Alternative VPN solution with enhanced compatibility

# OpenVPN Server Configuration
port 1194
proto udp
dev tun
ca ca.crt
cert server.crt
key server.key
dh dh.pem
server 10.9.0.0 255.255.255.0
ifconfig-pool-persist ipp.txt
push "route 192.168.1.0 255.255.255.0"
push "dhcp-option DNS 10.9.0.1"
push "dhcp-option DNS 8.8.8.8"
keepalive 10 120
comp-lzo
user nobody
group nogroup
persist-key
persist-tun
status openvpn-status.log
log /var/log/openvpn.log
verb 3

# Watershed-specific configurations
# Allow access to mapping system
push "route 10.8.0.0 255.255.255.0"
push "route 172.16.0.0 255.240.0.0"

# Security settings
cipher AES-256-CBC
auth SHA256
tls-auth ta.key 0
key-direction 0

# Network and routing
# NAT for internet access
route 10.8.0.0 255.255.255.0
route 172.16.0.0 255.240.0.0

# Block all traffic if VPN drops (kill switch)
# Use iptables rules on server

# Client configurations will be in separate files
# client-config-dir /etc/openvpn/ccd
