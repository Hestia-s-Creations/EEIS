# Watershed Disturbance Mapping System - Linux Client Configuration
# WireGuard Client Configuration for Linux

[Interface]
# Private key (generate with: wg genkey)
PrivateKey = CLIENT_PRIVATE_KEY_HERE

# Client IP address
Address = CLIENT_IP_HERE/24

# DNS servers - use VPN DNS when connected, fallback to public DNS
DNS = 10.8.0.1, 1.1.1.1, 8.8.8.8

# MTU - optimized for most networks
MTU = 1420

# Save configuration changes
SaveConfig = false

[Peer]
# Server public key
PublicKey = SERVER_PUBLIC_KEY_HERE

# Server address
Endpoint = SERVER_HOSTNAME_OR_IP:51820

# Route all traffic through VPN
AllowedIPs = 0.0.0.0/0, ::/0

# Keep connection alive
PersistentKeepalive = 25

# Optional: Add route commands for more control
# PostUp = ip route add SERVER_IP/32 dev eth0; ip route add 0.0.0.0/1 dev $INTERFACE; ip route add 128.0.0.0/1 dev $INTERFACE
# PostDown = ip route del SERVER_IP/32 dev eth0; ip route del 0.0.0.0/1 dev $INTERFACE; ip route del 128.0.0.0/1 dev $INTERFACE
