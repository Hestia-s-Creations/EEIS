# Watershed Disturbance Mapping System - Mobile Client Configuration
# WireGuard Client Configuration for iOS/Android Mobile Devices

[Interface]
# Private key for mobile device
PrivateKey = CLIENT_PRIVATE_KEY_HERE

# Mobile device IP in VPN
Address = CLIENT_IP_HERE/24

# DNS servers - include mobile-friendly options
DNS = 10.8.0.1, 1.1.1.1, 8.8.8.8

# Lower MTU for mobile networks
MTU = 1280

# Auto-connect when available
Table = auto

[Peer]
# Server information
PublicKey = SERVER_PUBLIC_KEY_HERE
Endpoint = SERVER_HOSTNAME_OR_IP:51820

# Route all traffic for security
AllowedIPs = 0.0.0.0/0, ::/0

# Frequent keepalive for mobile networks
PersistentKeepalive = 15

# Mobile optimization notes:
# - Lower MTU (1280) works better with mobile networks
# - Shorter keepalive (15s) maintains connection on cellular
# - Use 'AllowedIPs = 0.0.0.0/0' to route all traffic through VPN
# - Consider 'AllowedIPs = 10.8.0.0/24' for only VPN network access

# Client information
# Device: Mobile Device
# Platform: iOS/Android
# User: CLIENT_NAME
# Generated: GENERATION_DATE
