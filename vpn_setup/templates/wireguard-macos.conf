# Watershed Disturbance Mapping System - macOS Client Configuration
# WireGuard Client Configuration for macOS

[Interface]
# Private key
PrivateKey = CLIENT_PRIVATE_KEY_HERE

# Client IP address
Address = CLIENT_IP_HERE/24

# DNS configuration
DNS = 10.8.0.1, 1.1.1.1, 8.8.8.8

# MTU for macOS
MTU = 1420

# Automatic startup
Table = 1

[Peer]
# Server configuration
PublicKey = SERVER_PUBLIC_KEY_HERE
Endpoint = SERVER_HOSTNAME_OR_IP:51820

# Route all traffic
AllowedIPs = 0.0.0.0/0, ::/0

# Connection persistence
PersistentKeepalive = 25

# Metadata
# Client: CLIENT_NAME
# Platform: macOS
# Generated: GENERATION_DATE
