# Watershed Disturbance Mapping System - Client Configuration Template
# WireGuard Client Configuration for Windows

[Interface]
# Private key should be unique for each client
PrivateKey = CLIENT_PRIVATE_KEY_HERE

# Client IP address in VPN network
Address = CLIENT_IP_HERE/24

# DNS servers (Cloudflare and internal DNS)
DNS = 10.8.0.1, 1.1.1.1, 8.8.8.8

# MTU setting (adjust based on network)
MTU = 1420

[Peer]
# WireGuard server public key
PublicKey = SERVER_PUBLIC_KEY_HERE

# Server address and port
Endpoint = SERVER_HOSTNAME_OR_IP:51820

# Allowed IP addresses - all traffic through VPN
AllowedIPs = 0.0.0.0/0, ::/0

# Keep connection alive every 25 seconds (important for NAT/firewall traversal)
PersistentKeepalive = 25

# Comment for identification
# Description: Watershed Mapping Client - CLIENT_NAME
# Generated: GENERATION_DATE
