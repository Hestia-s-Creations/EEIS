# Watershed Disturbance Mapping System - Network Access Control
# Network configuration and routing rules for VPN infrastructure

# ===============================================
# NETWORK INTERFACE CONFIGURATION
# ===============================================

# Primary Network Interface (replace eth0 with actual interface name)
PRIMARY_IF="eth0"

# VPN Network Interfaces
WG_INTERFACE="wg0"
OVPN_INTERFACE="tun0"

# VPN Network Ranges
WG_NETWORK="10.8.0.0/24"
OVPN_NETWORK="10.9.0.0/24"

# Internal System Networks
MAPPING_SYSTEM_NETWORK="172.16.0.0/12"
LOCAL_NETWORK="192.168.1.0/24"

# ===============================================
# ACCESS CONTROL POLICIES
# ===============================================

# Default Policies
DEFAULT_INPUT_POLICY="DROP"
DEFAULT_FORWARD_POLICY="DROP"
DEFAULT_OUTPUT_POLICY="ACCEPT"

# VPN-Specific Allow Rules
# Allow established connections
ALLOW_ESTABLISHED="iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT"
ALLOW_RELATED="iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT"

# Allow VPN Traffic
ALLOW_WIREGUARD="iptables -A INPUT -p udp --dport 51820 -j ACCEPT"
ALLOW_OPENVPN="iptables -A INPUT -p udp --dport 1194 -j ACCEPT"

# Allow SSH
ALLOW_SSH="iptables -A INPUT -p tcp --dport 22 -j ACCEPT"

# ===============================================
# ROUTING RULES
# ===============================================

# WireGuard Interface Routing
# Enable IP forwarding for WireGuard
echo 1 > /proc/sys/net/ipv4/ip_forward

# WireGuard NAT configuration
WG_NAT="iptables -t nat -A POSTROUTING -s $WG_NETWORK -o $PRIMARY_IF -j MASQUERADE"
WG_FORWARD="iptables -A FORWARD -i $WG_INTERFACE -j ACCEPT"
WG_RETURN="iptables -A FORWARD -o $WG_INTERFACE -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT"

# OpenVPN Interface Routing
OVPN_NAT="iptables -t nat -A POSTROUTING -s $OVPN_NETWORK -o $PRIMARY_IF -j MASQUERADE"
OVPN_FORWARD="iptables -A FORWARD -i $OVPN_INTERFACE -j ACCEPT"
OVPN_RETURN="iptables -A FORWARD -o $OVPN_INTERFACE -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT"

# ===============================================
# NETWORK SEGMENTATION
# ===============================================

# Map access policy - restricted access
MAP_ACCESS_ACL="iptables -A FORWARD -s $WG_NETWORK -d 172.16.0.0/12 -j ACCEPT"
MAP_DNS_ALLOW="iptables -A FORWARD -s $WG_NETWORK -d 172.16.10.1 -p tcp --dport 53 -j ACCEPT"
MAP_DNS_ALLOW_UDP="iptables -A FORWARD -s $WG_NETWORK -d 172.16.10.1 -p udp --dport 53 -j ACCEPT"

# Research data access - limited access
RESEARCH_ACCESS="iptables -A FORWARD -s $WG_NETWORK -d 172.16.20.0/24 -j ACCEPT"
RESEARCH_API="iptables -A FORWARD -s $WG_NETWORK -d 172.16.30.0/24 -p tcp --dport 8080 -j ACCEPT"

# Admin access - full access
ADMIN_ACCESS="iptables -A FORWARD -s 10.8.0.2/32 -d 0.0.0.0/0 -j ACCEPT"

# Block unauthorized access
BLOCK_PRIVATE_NETS="iptables -A FORWARD -s $WG_NETWORK -d 10.0.0.0/8 -j DROP"
BLOCK_LOCALHOST="iptables -A FORWARD -s $WG_NETWORK -d 127.0.0.0/8 -j DROP"
BLOCK_MULTICAST="iptables -A FORWARD -s $WG_NETWORK -d 224.0.0.0/4 -j DROP"

# ===============================================
# QUALITY OF SERVICE
# ===============================================

# Rate limiting for VPN connections
LIMIT_CONNECTIONS="iptables -A INPUT -p udp --dport 51820 -m limit --limit 3/min --limit-burst 3 -j ACCEPT"
LIMIT_OPENVPN="iptables -A INPUT -p udp --dport 1194 -m limit --limit 3/min --limit-burst 3 -j ACCEPT"

# Bandwidth allocation (if using tc)
VOICE_QOS="tc qdisc add dev $WG_INTERFACE root handle 1: htb default 30"
VOICE_CLASS="tc class add dev $WG_INTERFACE parent 1: classid 1:10 htb rate 2mbit ceil 5mbit"

# ===============================================
# MONITORING AND LOGGING
# ===============================================

# Log VPN connection attempts
LOG_WG_CONNECTIONS="iptables -A INPUT -p udp --dport 51820 -j LOG --log-prefix 'WireGuard: '"
LOG_OVPN_CONNECTIONS="iptables -A INPUT -p udp --dport 1194 -j LOG --log-prefix 'OpenVPN: '"

# Log suspicious activity
LOG_SUSPICIOUS="iptables -A FORWARD -m conntrack --ctstate INVALID -j LOG --log-prefix 'INVALID: '"
LOG_SUSPICIOUS_DROP="iptables -A FORWARD -m conntrack --ctstate INVALID -j DROP"

# Log dropped packets for debugging
LOG_DROPPED="iptables -A FORWARD -j LOG --log-prefix 'DROPPED: ' --log-level 4"

# ===============================================
# NETWORK ADDRESS TRANSLATION
# ===============================================

# NAT Rules for VPN Access
NAT_RULES="
iptables -t nat -A POSTROUTING -s $WG_NETWORK -o $PRIMARY_IF -j MASQUERADE
iptables -t nat -A POSTROUTING -s $OVPN_NETWORK -o $PRIMARY_IF -j MASQUERADE
"

# Port forwarding (if needed)
# Forward specific ports to internal services
PORT_FORWARDS="
iptables -t nat -A PREROUTING -p tcp --dport 8080 -d $PRIMARY_IF -j DNAT --to-destination 172.16.10.10:8080
iptables -A FORWARD -p tcp --dport 8080 -d 172.16.10.10 -j ACCEPT
"

# ===============================================
# IPV6 CONFIGURATION (if enabled)
# ===============================================

# Enable IPv6 forwarding
echo 1 > /proc/sys/net/ipv6/conf/all/forwarding

# IPv6 NAT rules (if using IPv6)
# ip6tables -t nat -A POSTROUTING -s fd00::/8 -o $PRIMARY_IF -j MASQUERADE
# ip6tables -A FORWARD -i $WG_INTERFACE -j ACCEPT

# ===============================================
# DYNAMIC RULES MANAGEMENT
# ===============================================

# Interface-specific rules
WG_INTERFACE_RULES="
# Apply when WireGuard interface comes up
iptables -I INPUT -i $WG_INTERFACE -j ACCEPT
iptables -I FORWARD -i $WG_INTERFACE -j ACCEPT
iptables -I FORWARD -o $WG_INTERFACE -j ACCEPT
"

OVPN_INTERFACE_RULES="
# Apply when OpenVPN interface comes up
iptables -I INPUT -i $OVPN_INTERFACE -j ACCEPT
iptables -I FORWARD -i $OVPN_INTERFACE -j ACCEPT
iptables -I FORWARD -o $OVPN_INTERFACE -j ACCEPT
"

# Cleanup rules (when interfaces go down)
CLEANUP_RULES="
# Remove WireGuard interface rules
iptables -D INPUT -i $WG_INTERFACE -j ACCEPT 2>/dev/null
iptables -D FORWARD -i $WG_INTERFACE -j ACCEPT 2>/dev/null
iptables -D FORWARD -o $WG_INTERFACE -j ACCEPT 2>/dev/null

# Remove OpenVPN interface rules
iptables -D INPUT -i $OVPN_INTERFACE -j ACCEPT 2>/dev/null
iptables -D FORWARD -i $OVPN_INTERFACE -j ACCEPT 2>/dev/null
iptables -D FORWARD -o $OVPN_INTERFACE -j ACCEPT 2>/dev/null
"
